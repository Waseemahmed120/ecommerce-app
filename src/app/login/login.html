<div class="login-container">
  <h2>Login</h2>

  <form [formGroup]="loginForm" (ngSubmit)="login()">
    
    <input
      type="text"
      placeholder="Username"
      formControlName="username"
    />

    <input
      type="password"
      placeholder="Password"
      formControlName="password"
    />

    <button type="submit" [disabled]="loginForm.invalid">
      Login
    </button>
  </form>

  @if (errorMessage) {
  <p class="error">
    {{ errorMessage }}
  </p>
}
</div>
