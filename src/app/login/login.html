<div class="login-page d-flex justify-content-center align-items-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-8 col-md-6 col-lg-5 col-xl-4">
        
        <!-- Login Card -->
        <div class="login-card">
          <div class="text-center mb-4">
            <div class="login-icon-wrapper mb-3">
              <span class="fs-1">📦</span>
            </div>
            <h2 class="fw-bold text-dark mb-1">Welcome Back</h2>
            <p class="text-muted small">Sign in to your account</p>
          </div>

          <form [formGroup]="loginForm" (ngSubmit)="login()" novalidate>
            
            <div class="mb-3">
              <label for="username" class="form-label small fw-semibold text-muted">Username</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-person text-muted"></i>
                </span>
                <input 
                  type="text" 
                  id="username"
                  class="form-control border-start-0 ps-0"
                  [class.is-invalid]="usernameControl?.invalid && usernameControl?.touched"
                  placeholder="Enter your username"
                  formControlName="username"
                  autocomplete="off"
                />
              </div>
              <div class="invalid-feedback" *ngIf="usernameControl?.invalid && usernameControl?.touched">
                Username is required
              </div>
            </div>

            <!-- Password Input -->
            <div class="mb-4">
              <label for="password" class="form-label small fw-semibold text-muted">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-lock text-muted"></i>
                </span>
                <input 
                  [type]="showPassword ? 'text' : 'password'"
                  id="password"
                  class="form-control border-start-0 border-end-0 ps-0"
                  [class.is-invalid]="passwordControl?.invalid && passwordControl?.touched"
                  placeholder="Enter your password"
                  formControlName="password"
                  autocomplete="current-password"
                />
                <span class="input-group-text bg-white border-start-0" style="cursor: pointer;" (click)="togglePassword()">
                  <i class="bi" [class.bi-eye-slash]="showPassword" [class.bi-eye]="!showPassword"></i>
                </span>
              </div>
              <div class="invalid-feedback d-block" *ngIf="passwordControl?.invalid && passwordControl?.touched">
                Password is required
              </div>
            </div>

            <!-- Error Alert -->
            <div class="alert alert-danger py-2 text-center small mb-3" *ngIf="errorMessage">
              <i class="bi bi-exclamation-circle me-1"></i>{{ errorMessage }}
            </div>

            <!-- Submit Button -->
            <button 
              type="submit" 
              class="btn btn-success w-100 py-2 fw-semibold"
              [disabled]="loginForm.invalid"
            >
              <i class="bi bi-box-arrow-in-right me-2"></i>SIGN IN
            </button>

          </form>
        </div>

      </div>
    </div>
  </div>
</div>
