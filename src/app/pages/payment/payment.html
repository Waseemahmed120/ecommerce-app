<div class="container-fluid px-0">
  
  <div class="row justify-content-center">
    <div class="col-lg-6">
      
      <div class="card shadow-sm">
        <div class="card-header bg-white fw-semibold">
          <h4 class="mb-0">💳 Payment Method</h4>
        </div>
        
        <div class="card-body">
          
          <!-- Total Amount -->
          <div class="alert alert-info mb-4">
            <div class="d-flex justify-content-between align-items-center">
              <span class="fw-semibold">Total Amount:</span>
              <span class="fs-4 fw-bold">${{ totalAmount | number:'1.2-2' }}</span>
            </div>
          </div>

          <!-- Payment Options -->
          <div class="mb-4">
            <label class="form-label fw-semibold">Select Payment Method</label>
            
            <!-- HBL -->
            <div class="form-check card p-3 mb-3">
              <input class="form-check-input" type="radio" name="paymentMethod" 
                     id="hbl" value="hbl" [(ngModel)]="paymentMethod">
              <label class="form-check-label d-flex align-items-center gap-3" for="hbl">
                <span class="fw-semibold fs-5">🏦 HBL</span>
                <span class="text-muted">Habib Bank Limited</span>
              </label>
            </div>

            <!-- EasyPaisa -->
            <div class="form-check card p-3 mb-3">
              <input class="form-check-input" type="radio" name="paymentMethod" 
                     id="easypaisa" value="easypaisa" [(ngModel)]="paymentMethod">
              <label class="form-check-label d-flex align-items-center gap-3" for="easypaisa">
                <span class="fw-semibold fs-5">📱 EasyPaisa</span>
                <span class="text-muted">Mobile Wallet</span>
              </label>
            </div>

            <!-- Bank Account -->
            <div class="form-check card p-3">
              <input class="form-check-input" type="radio" name="paymentMethod" 
                     id="account" value="account" [(ngModel)]="paymentMethod">
              <label class="form-check-label d-flex align-items-center gap-3" for="account">
                <span class="fw-semibold fs-5">🏧 Bank Account</span>
                <span class="text-muted">Direct Transfer</span>
              </label>
            </div>
          </div>

          <!-- Account Number Input (shown only for bank account) -->
          <div class="mb-4" *ngIf="paymentMethod === 'account'">
            <label class="form-label fw-semibold">Account Number</label>
            <input 
              type="text" 
              class="form-control" 
              placeholder="Enter your account number"
              [(ngModel)]="accountNumber"
            >
            <small class="text-muted">Your funds will be transferred from this account</small>
          </div>

          <!-- Payment Instructions -->
          <div class="alert alert-light border mb-4">
            <h6 class="fw-semibold">Payment Instructions:</h6>
            <p class="mb-0 small">
              <span *ngIf="paymentMethod === 'hbl'">
                You will be redirected to HBL secure payment gateway.
              </span>
              <span *ngIf="paymentMethod === 'easypaisa'">
                You will receive a prompt on your EasyPaisa app.
              </span>
              <span *ngIf="paymentMethod === 'account'">
                Amount will be deducted from your provided account.
              </span>
            </p>
          </div>

          <!-- Action Buttons -->
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary" (click)="cancelPayment()">
              <i class="bi bi-arrow-left"></i> Back to Cart
            </button>
            <button class="btn btn-success flex-grow-1" (click)="submitPayment()">
              <i class="bi bi-check-circle"></i> Pay ${{ totalAmount | number:'1.2-2' }}
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>

</div>
