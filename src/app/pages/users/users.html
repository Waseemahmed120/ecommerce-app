
<div class="container-fluid px-0">

  <div class="card shadow-sm mb-4">
    <div class="card-header bg-white fw-semibold">
      {{ isEditMode ? 'Edit User' : 'Add User' }}
    </div>

    <div class="card-body">
      <form (ngSubmit)="submitUser()">
        <div class="row g-3">

          <div class="col-12 col-md-6 col-lg-3">
            <input class="form-control"
              placeholder="First Name"
              [(ngModel)]="formUser.firstName"
              name="firstName"
              required />
          </div>

          <div class="col-12 col-md-6 col-lg-3">
            <input class="form-control"
              placeholder="Last Name"
              [(ngModel)]="formUser.lastName"
              name="lastName"
              required />
          </div>

          <div class="col-12 col-md-6 col-lg-3">
            <input class="form-control"
              placeholder="Email"
              [(ngModel)]="formUser.email"
              name="email" />
          </div>

          <div class="col-12 col-md-6 col-lg-3">
            <input class="form-control"
              placeholder="Username"
              [(ngModel)]="formUser.username"
              name="username" />
          </div>

          <div class="col-12 d-flex justify-content-end gap-2">

            <button
              type="submit"
              class="btn"
              [class.btn-primary]="!isEditMode"
              [class.btn-success]="isEditMode"
            >
              {{ isEditMode ? 'Save User' : 'Add User' }}
            </button>

            <button
              *ngIf="isEditMode"
              type="button"
              class="btn btn-outline-secondary"
              (click)="cancelEdit()"
            >
              Cancel
            </button>

          </div>

        </div>
      </form>
    </div>
  </div>

  <!-- USERS CARDS (same as before) -->
  <div class="row g-4" *ngIf="users.length">

    <div class="col-12 col-sm-6 col-md-4 col-xl-3"
         *ngFor="let u of users">

      <div class="card h-100 shadow-sm border border-2 border-secondary">

        <div class="card-body">
          <div class="d-flex align-items-center mb-3">
            <div
              class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center me-3"
              style="width:48px;height:48px;font-weight:600;">
              {{ u.firstName[0] }}{{ u.lastName[0] }}
            </div>

            <div>
              <div class="fw-semibold">
                {{ u.firstName }} {{ u.lastName }}
              </div>
              <small class="text-muted">@{{ u.username }}</small>
            </div>
          </div>

          <div class="text-muted small text-break">
            {{ u.email }}
          </div>
        </div>

        <div class="card-footer bg-white d-flex justify-content-between">
          <button class="btn btn-sm btn-outline-primary"
            (click)="startEdit(u)">
            Edit
          </button>

          <button class="btn btn-sm btn-outline-danger"
            (click)="deleteUser(u.id)">
            Delete
          </button>
        </div>

      </div>
    </div>

  </div>

</div>
