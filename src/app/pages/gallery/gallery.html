  <div class="row g-4" *ngIf="products.length">

    <div class="col-12 col-sm-6 col-lg-3" *ngFor="let p of products">
      <div class="card shadow-sm h-100 border border-2 border-secondary">

        <div class="position-relative" style="cursor: pointer;" (click)="openImagePreview(p.images[0], p.title)">
          <img [src]="p.images[0] || 'https://via.placeholder.com/300x180?text=No+Image'"
               class="card-img-top"
               style="height:180px;object-fit:cover"
               alt="{{ p.title }}">
          <div class="position-absolute top-0 end-0 m-2">
            <span class="badge bg-dark bg-opacity-50">
              <i class="bi bi-zoom-in"></i> Click to preview
            </span>
          </div>
        </div>

        <div class="card-body d-flex flex-column">
          <h6 class="fw-semibold mb-1">{{ p.title }}</h6>
          <p class="text-muted small flex-grow-1">
            {{ p.description }}
          </p>

          <div class="mb-2">
            <div class="d-flex align-items-center gap-1">
              <ng-container *ngFor="let star of getStars(5)">
                <i class="bi"
                   [class.bi-star-fill]="star <= p.rating"
                   [class.bi-star]="star > p.rating"
                   [class.text-warning]="star <= p.rating"
                   [class.text-muted]="star > p.rating"
                   style="cursor: pointer; font-size: 1.1rem;"
                   (click)="setRating(p, star)"
                   [title]="'Rate ' + star + ' star' + (star > 1 ? 's' : '')">
                </i>
              </ng-container>
              <small class="text-muted ms-1" *ngIf="p.rating > 0">({{ p.rating }}/5)</small>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-2">
            <span class="fw-bold">${{ p.price | number:'1.2-2' }}</span>

            <div>
              <button
                class="btn btn-sm btn-outline-primary me-1"
                (click)="startEdit(p)">
                <i class="bi bi-pencil"></i>
                Edit
              </button>
              <button
                class="btn btn-sm btn-outline-danger"
                (click)="openDeleteDialog(p)">
                <i class="bi bi-trash"></i>
                Delete
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <div class="text-center py-5" *ngIf="!products.length">
    <i class="bi bi-images display-1 text-muted"></i>
    <h5 class="text-muted mt-3">No products found</h5>
    <p class="text-muted">Add a new product using the form above</p>
  </div>

  <div class="modal fade show d-block" 
       *ngIf="showDeleteDialog" 
       tabindex="-1" 
       style="background-color: rgba(0,0,0,0.5);"
       (click)="closeDeleteDialog()">
    <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
      <div class="modal-content shadow">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-semibold">
            <i class="bi bi-exclamation-triangle text-warning me-2"></i>
            Confirm Delete
          </h5>
          <button type="button" 
                  class="btn-close" 
                  (click)="closeDeleteDialog()" 
                  aria-label="Close"></button>
        </div>
        
        <div class="modal-body py-4">
          <p class="mb-2">Are you sure you want to delete this product?</p>
          <div class="bg-light p-3 rounded mt-3" *ngIf="productToDelete">
            <div class="d-flex align-items-center">
              <img [src]="productToDelete.images[0] || 'https://via.placeholder.com/50x50?text=No+Image'"
                   class="rounded me-3"
                   style="width:50px;height:50px;object-fit:cover"
                   alt="{{ productToDelete.title }}">
              <div>
                <div class="fw-semibold">{{ productToDelete.title }}</div>
                <small class="text-muted">${{ productToDelete.price | number:'1.2-2' }}</small>
              </div>
            </div>
          </div>
          <p class="text-danger small mt-3 mb-0">
            <i class="bi bi-info-circle me-1"></i>
            This action cannot be undone.
          </p>
        </div>
        
        <div class="modal-footer border-0">
          <button type="button" 
                  class="btn btn-outline-secondary" 
                  (click)="closeDeleteDialog()">
            Cancel
          </button>
          <button type="button" 
                  class="btn btn-danger" 
                  (click)="confirmDelete()">
            <i class="bi bi-trash me-1"></i>
            Delete Product
          </button>
        </div>
      </div>
    </div>
  </div>
