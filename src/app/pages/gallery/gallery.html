<div class="container-fluid px-0">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-semibold mb-0">Gallery</h4>
  </div>

  <!-- ADD / EDIT PRODUCT -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-white fw-semibold">
      {{ isEditMode ? 'Edit Product' : 'Add Product' }}
    </div>

    <div class="card-body">
      <form (ngSubmit)="submitProduct()">
        <div class="row g-3">

          <div class="col-12 col-md-6 col-lg-3">
            <input class="form-control"
                   placeholder="Title"
                   [(ngModel)]="formProduct.title"
                   name="title"
                   required>
          </div>

          <div class="col-12 col-md-6 col-lg-3">
            <input class="form-control"
                   placeholder="Description"
                   [(ngModel)]="formProduct.description"
                   name="description"
                   required>
          </div>

          <div class="col-12 col-md-6 col-lg-2">
            <input type="number"
                   class="form-control"
                   placeholder="Price"
                   [(ngModel)]="formProduct.price"
                   name="price"
                   required>
          </div>

          <div class="col-12 col-md-6 col-lg-4">
            <input class="form-control"
                   placeholder="Image URL"
                   [(ngModel)]="formProduct.images[0]"
                   name="image">
          </div>

          <div class="col-12 d-flex justify-content-end gap-2">
            <button
              type="submit"
              class="btn"
              [class.btn-primary]="!isEditMode"
              [class.btn-success]="isEditMode">
              {{ isEditMode ? 'Save Product' : 'Add Product' }}
            </button>

            <button
              *ngIf="isEditMode"
              type="button"
              class="btn btn-outline-secondary"
              (click)="cancelEdit()">
              Cancel
            </button>
          </div>

        </div>
      </form>
    </div>
  </div>

  <!-- PRODUCT GRID -->
  <div class="row g-4" *ngIf="products.length">

    <div class="col-12 col-sm-6 col-lg-3" *ngFor="let p of products">
      <div class="card shadow-sm h-100 border border-2 border-secondary">

        <img [src]="p.images[0]"
             class="card-img-top"
             style="height:180px;object-fit:cover">

        <div class="card-body d-flex flex-column">
          <h6 class="fw-semibold mb-1">{{ p.title }}</h6>
          <p class="text-muted small flex-grow-1">
            {{ p.description }}
          </p>

          <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold">${{ p.price }}</span>

            <div>
              <button
                class="btn btn-sm btn-outline-primary me-1"
                (click)="startEdit(p)">
                Edit
              </button>
              <button
                class="btn btn-sm btn-outline-danger"
                (click)="deleteProduct(p)">
                Delete
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <p *ngIf="!products.length" class="text-muted text-center">
    No products found
  </p>

</div>
