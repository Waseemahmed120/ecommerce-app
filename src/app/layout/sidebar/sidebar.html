
<div class="d-flex">
  <aside
    class="sidebar bg-dark text-white d-flex flex-column p-3 position-fixed top-0 start-0 vh-100"
    [class.open]="isSidebarOpen"
  >
    <h4 class="mb-4 mt-4 border-bottom border-secondary pb-3">
      🛍️ ShopHub
    </h4>

    <nav class="nav nav-pills flex-column gap-2">
      <a
        class="nav-link text-white"
        routerLink="users"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <i class="bi bi-people me-2"></i> Users
      </a>

      <a
        class="nav-link text-white"
        routerLink="posts"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <i class="bi bi-shop me-2"></i> Products
      </a>

      <a
        class="nav-link text-white"
        routerLink="cart"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <i class="bi bi-cart me-2"></i> Cart
      </a>
    </nav>

    <button
      class="btn btn-outline-light mt-auto"
      (click)="logout()"
    >
      <i class="bi bi-box-arrow-right me-2"></i> Logout
    </button>
  </aside>

  <div class="d-md-none position-fixed bottom-0 start-0 m-3" style="z-index: 1060;">
    <button
      class="btn btn-dark rounded-circle shadow-lg"
      style="width: 50px; height: 50px;"
      (click)="toggleSidebar()"
    >
      <i class="bi" [class.bi-list]="!isSidebarOpen" [class.bi-x]="isSidebarOpen"></i>
    </button>
  </div>
</div>
